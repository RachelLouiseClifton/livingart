<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>paintings — Living Art</title>
<style>
  :root{--paper:#f8f5f0;--ink:#241d1b;--whisper:#a99f97}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:Georgia,"Times New Roman",serif;
    background-image:radial-gradient(120% 90% at 15% 25%, rgba(255,244,224,.6), rgba(255,244,224,0) 55%),
      radial-gradient(90% 70% at 88% 82%, rgba(255,232,236,.4), rgba(255,232,236,0) 60%)}
  .wrap{max-width:880px;margin:0 auto;padding:4rem 1.5rem 6rem}
  h1{font-weight:normal;font-style:italic;font-size:1.3rem;letter-spacing:.08em;color:#453d38;margin-bottom:3.5rem}
  h1 a{color:inherit;text-decoration:none}
  .p{margin-bottom:4.5rem}
  .p img{width:100%;display:block;box-shadow:0 8px 40px rgba(36,29,27,.12)}
  .p figcaption{font-size:.8rem;color:var(--whisper);font-style:italic;margin-top:.8rem;letter-spacing:.05em}
  .p figcaption a{color:inherit;text-decoration:none;border-bottom:1px dotted rgba(36,29,27,.35)}
  .p figcaption a:hover{color:var(--ink)}
  .back{font-size:.8rem;font-style:italic;letter-spacing:.06em}
  .back a{color:var(--whisper);text-decoration:none;border-bottom:1px dotted rgba(36,29,27,.3)}
  .back a:hover{color:var(--ink)}

  .caustics{position:fixed;inset:-20%;pointer-events:none;z-index:0;opacity:.55;
    background:
      radial-gradient(closest-side, rgba(255,247,228,.9), transparent 70%) 10% 20%/38% 38% no-repeat,
      radial-gradient(closest-side, rgba(255,236,242,.7), transparent 70%) 70% 15%/32% 32% no-repeat,
      radial-gradient(closest-side, rgba(255,250,235,.8), transparent 70%) 40% 75%/40% 40% no-repeat,
      radial-gradient(closest-side, rgba(250,240,255,.6), transparent 70%) 85% 65%/30% 30% no-repeat;
    filter:blur(14px);animation:drift 22s ease-in-out infinite alternate;mix-blend-mode:soft-light}
  
  @keyframes drift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(2%,-2.5%) scale(1.08)}100%{transform:translate(-2%,2%) scale(1.03)}}
  
  .motes{position:fixed;inset:0;pointer-events:none;z-index:2;overflow:hidden}
  .mote{position:absolute;bottom:-10px;width:var(--s);height:var(--s);border-radius:50%;
    background:radial-gradient(closest-side,rgba(255,250,238,.95),rgba(255,240,220,.5),transparent);
    filter:drop-shadow(0 0 3px rgba(255,240,214,.8));opacity:0;animation:float var(--fd) linear infinite;animation-delay:var(--fdl)}
  @keyframes float{0%{transform:translate(0,0);opacity:0}10%{opacity:.9}50%{transform:translate(var(--dx),-52vh)}90%{opacity:.7}100%{transform:translate(calc(var(--dx)*1.6),-104vh);opacity:0}}
  .content{padding:clamp(2rem,5vw,6rem) clamp(1.5rem,5vw,6rem);display:flex;flex-direction:column;justify-content:center;max-width:46ch}
  .content h1{font-weight:400;font-size:clamp(2rem,4vw,3.2rem);line-height:1.1;margin-bottom:1rem}
  .content .mono{margin-top:2.2rem;font-family:ui-monospace,monospace;font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;color:#c3b8b0}
  @media (max-width:760px){.page{grid-template-columns:1fr}.content{order:-1;padding-bottom:0}}
  @media (prefers-reduced-motion:reduce){.glint,.sheen,.star,.mote,.caustics{animation:none}.star,.mote{opacity:.4}}

  .wordmark{position:fixed;left:50%;bottom:10vh;z-index:5;
    font-family:ui-monospace,"SFMono-Regular",monospace;
    font-size:clamp(1.1rem,2.2vw,1.9rem);letter-spacing:.22em;text-transform:uppercase;
    text-decoration:none;white-space:nowrap;transform-origin:center center;
    animation:breathe 15s cubic-bezier(.45,.05,.35,1) infinite}
  .wordmark .txt{
    background:linear-gradient(100deg,#c98a86 0%,#a85f66 18%,#8a4a52 34%,#fff 48%,#ffe9cf 52%,#8a4a52 66%,#a85f66 82%,#c98a86 100%);
    background-size:280% 100%;-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    animation:wordshimmer 7s ease-in-out infinite,wordglow 15s ease-in-out infinite}
  @keyframes wordshimmer{0%{background-position:130% 0}50%{background-position:-30% 0}100%{background-position:130% 0}}
  /* the metamorphosis: a slow, awed swell from small to large and back */
  @keyframes breathe{
    0%{transform:translateX(-50%) scale(.5)}
    50%{transform:translateX(-50%) scale(2.9)}
    100%{transform:translateX(-50%) scale(.5)}}
  @keyframes wordglow{
    0%,100%{filter:drop-shadow(0 0 4px rgba(255,232,204,.3))}
    50%{filter:drop-shadow(0 0 18px rgba(255,236,206,.85)) drop-shadow(0 0 36px rgba(255,214,180,.5))}}

  
  .credit{position:static;margin-top:4rem;text-align:right;font-style:italic;font-size:clamp(.95rem,1.4vw,1.15rem);color:#453d38} .credit a{color:inherit}
  .credit a{color:#a85f66;text-decoration:none;
    border-bottom:1px solid rgba(168,95,102,.5);padding-bottom:1px;
    transition:border-color .3s,color .3s}
  .credit a:hover{color:#8a4a52;border-color:#8a4a52}
  @media (max-width:760px){.credit{right:50%;transform:translateX(50%);bottom:1.2rem;text-align:center}}

  /* --- additions 17 Jul: labelled marks, dated works, search --- */
  .mark{cursor:pointer;position:relative}
  .mark .label{position:absolute;left:50%;bottom:-1.6rem;transform:translateX(-50%);
    font-style:italic;font-size:.85rem;letter-spacing:.06em;color:var(--whisper);
    opacity:.55;transition:opacity .6s ease,color .6s ease;white-space:nowrap;pointer-events:none}
  .mark:hover .label,.mark:focus-within .label{opacity:1;color:var(--ink)}
  .mark a.marklink{position:absolute;inset:0;z-index:3;text-decoration:none}
  .content{display:flex;flex-direction:column;gap:3rem;padding:4rem 3rem 4rem 1rem;max-width:560px;align-self:start;position:sticky;top:0;min-height:100vh;justify-content:center}
  .search input::-webkit-search-cancel-button{-webkit-appearance:none}
  .search{position:relative}
  .search input{width:100%;background:transparent;border:0;border-bottom:1px solid rgba(36,29,27,.25);
    font-family:inherit;font-size:1.05rem;color:var(--ink);padding:.5rem .2rem;outline:none}
  .search input::placeholder{color:var(--whisper);font-style:italic}
  .search input:focus{border-bottom-color:rgba(36,29,27,.55)}
  .search .hint{font-size:.75rem;color:var(--whisper);margin-top:.45rem;letter-spacing:.05em}
  .results{display:flex;flex-direction:column;gap:1.2rem;max-height:46vh;overflow-y:auto;padding-right:.5rem}
  .results .tweet{font-size:.95rem;line-height:1.55}
  .results .tweet .when{display:block;font-size:.72rem;color:var(--whisper);letter-spacing:.08em;margin-bottom:.15rem}
  .results .tweet a{color:inherit;text-decoration:none;border-bottom:1px dotted rgba(36,29,27,.3)}
  .results .tweet a:hover{border-bottom-style:solid}
  .works h2{font-size:.8rem;font-weight:normal;letter-spacing:.18em;text-transform:uppercase;color:var(--whisper);margin-bottom:1.2rem}
  .works .row{display:flex;gap:1.1rem;flex-wrap:wrap}
  .works figure{width:86px}
  .works img{width:100%;display:block;filter:saturate(.92)}
  .works figcaption{font-size:.68rem;color:var(--whisper);margin-top:.35rem;letter-spacing:.05em;text-align:center}
  .works .pname{font-style:italic;font-size:.78rem;color:var(--ink);opacity:.75}
  .works .pname a{color:inherit;text-decoration:none;border-bottom:1px dotted rgba(36,29,27,.35)}
  .works .pname a:hover{border-bottom-style:solid}
  .works .pdate{font-size:.66rem}
  @media (max-width:900px){.page{grid-template-columns:1fr}.content{padding:2rem 1.5rem;max-width:none}}


  .message textarea{width:100%;background:transparent;border:1px solid rgba(36,29,27,.18);
    font-family:inherit;font-size:.95rem;color:var(--ink);padding:.8rem;min-height:88px;resize:vertical;outline:none}
  .message textarea:focus{border-color:rgba(36,29,27,.4)}
  .message input{width:100%;background:transparent;border:0;border-bottom:1px solid rgba(36,29,27,.18);font-family:inherit;font-size:.9rem;color:var(--ink);padding:.5rem .2rem;margin-top:.7rem;outline:none}
  .message input::placeholder{color:var(--whisper);font-style:italic}
  .message input:focus{border-bottom-color:rgba(36,29,27,.4)}
  .message .fine{font-size:.72rem;color:var(--whisper);font-style:italic;margin-top:.5rem;letter-spacing:.04em}
  .message textarea::placeholder{color:var(--whisper);font-style:italic}
  .message .send{margin-top:.6rem;display:inline-block;background:none;border:0;cursor:pointer;
    font-family:inherit;font-style:italic;font-size:.9rem;color:var(--whisper);letter-spacing:.06em;padding:.2rem 0;
    border-bottom:1px dotted rgba(36,29,27,.3)}
  .message .send:hover{color:var(--ink);border-bottom-style:solid}
  .message .sent{font-style:italic;font-size:.85rem;color:var(--whisper);margin-top:.6rem;display:none}


</style>
</head>
<body>
  <div class="wrap">
    <h1><a href="../index.html">living art</a> &middot; paintings</h1>
    <figure class="p"><img src="in-praise.jpg" alt="in praise of God&rsquo;s love — watercolour, 16 july 2026" loading="lazy"><figcaption><a href="https://x.com/rachelclif/status/2077916740005040515" target="_blank" rel="noopener">in praise of God&rsquo;s love</a> &middot; 16 july 2026</figcaption></figure>
    <figure class="p"><img src="tendrils.jpg" alt="tendrils — watercolour, 17 july 2026" loading="lazy"><figcaption><a href="https://x.com/rachelclif/status/2078317743737110725" target="_blank" rel="noopener">tendrils</a> &middot; 17 july 2026</figcaption></figure>
    <figure class="p"><img src="edenic-a-thing-of-beauty.jpg" alt="edenic (a thing of beauty) — watercolour, 18 july 2026" loading="lazy"><figcaption><a href="https://x.com/rachelclif/status/2078696466424734056" target="_blank" rel="noopener">edenic (a thing of beauty)</a> &middot; 18 july 2026</figcaption></figure>
    <figure class="p"><img src="who-am-i.jpg" alt="who am I? — watercolour, 20 july 2026" loading="lazy"><figcaption>who am I? &middot; 20 july 2026</figcaption></figure>
    <div class="back"><a href="../index.html">&larr; back to the studio</a></div>
  </div>
<div class="caustics"></div>
  <div class="motes" id="motes"></div>
  <div class="credit">a work of art by <a href="https://x.com/rachelclif" target="_blank" rel="noopener">Rachel Clifton</a></div>
  <script>
  const rnd=(a,b)=>a+Math.random()*(b-a);
  const motes=document.getElementById('motes');
  for(let i=0;i<48;i++){const m=document.createElement('span');m.className='mote';
    m.style.left=rnd(0,100)+'%';m.style.setProperty('--s',rnd(2,6).toFixed(1)+'px');
    m.style.setProperty('--dx',rnd(-40,40).toFixed(0)+'px');
    m.style.setProperty('--fd',rnd(14,30).toFixed(1)+'s');
    m.style.setProperty('--fdl',(-rnd(0,30)).toFixed(1)+'s');motes.appendChild(m);}
</script>
</body>
</html>
